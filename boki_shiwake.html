<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="簿記論仕訳">
<title>簿記論 仕訳100問</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #1a1814;
  --text2: #6b6760;
  --text3: #9c9890;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --accent: #2d5a3d;
  --accent-bg: #e8f2eb;
  --accent-text: #1a3d26;
  --debit: #0c447c;
  --debit-bg: #e6f1fb;
  --credit: #712b13;
  --credit-bg: #faece7;
  --purple-bg: #eeedfe; --purple-text: #3c3489;
  --teal-bg: #e1f5ee; --teal-text: #085041;
  --coral-bg: #faece7; --coral-text: #712b13;
  --blue-bg: #e6f1fb; --blue-text: #0c447c;
  --amber-bg: #faeeda; --amber-text: #633806;
  --green-bg: #eaf3de; --green-text: #27500a;
  --pink-bg: #fbeaf0; --pink-text: #72243e;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210;
    --surface: #1e1c19;
    --surface2: #262420;
    --text: #f0ede8;
    --text2: #a8a49c;
    --text3: #6e6a62;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --accent: #7fc9a0;
    --accent-bg: #1d3a26;
    --accent-text: #c8e6d4;
    --debit: #85b7eb;
    --debit-bg: #1a3050;
    --credit: #f0997b;
    --credit-bg: #4a1b0c;
    --purple-bg: #2d2870; --purple-text: #cecbf6;
    --teal-bg: #0f3d35; --teal-text: #9fe1cb;
    --coral-bg: #5c2515; --coral-text: #f5c4b3;
    --blue-bg: #163660; --blue-text: #b5d4f4;
    --amber-bg: #4a2d08; --amber-text: #fac775;
    --green-bg: #1f3a10; --green-text: #c0dd97;
    --pink-bg: #5a1f33; --pink-text: #f4c0d1;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); min-height: 100vh; }
.header { background: var(--surface); padding: 12px 16px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255,255,255,0.85); }
@media (prefers-color-scheme: dark) { .header { background: rgba(30,28,25,0.85); } }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.app-title { font-size: 15px; font-weight: 700; color: var(--text); }
.progress-text { font-size: 12px; color: var(--text2); font-variant-numeric: tabular-nums; }
.progress-wrap { width: 100%; }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.cats { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.cats::-webkit-scrollbar { display: none; }
.cat-btn { background: var(--surface2); border: none; border-radius: 999px; padding: 5px 12px; font-size: 12px; color: var(--text2); white-space: nowrap; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.cat-btn.active { background: var(--text); color: var(--surface); font-weight: 500; }
.install-hint { margin: 12px 16px; background: var(--accent-bg); border: 1px solid rgba(45,90,61,0.2); border-radius: 12px; padding: 10px 14px; font-size: 12px; color: var(--accent-text); line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
.hint-icon { font-size: 16px; flex-shrink: 0; }
.stats-row { display: flex; gap: 8px; padding: 8px 16px 12px; }
.stat-pill { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-align: center; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; padding: 0 16px 12px; }
.action-btn { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 8px; font-size: 13px; color: var(--text); cursor: pointer; font-family: inherit; font-weight: 500; }
.action-btn:active { background: var(--surface2); }
.q-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
.q-card.open { border-color: var(--accent); }
.q-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.q-num { font-size: 11px; color: var(--text3); font-weight: 500; font-variant-numeric: tabular-nums; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.b-purple { background: var(--purple-bg); color: var(--purple-text); }
.b-teal { background: var(--teal-bg); color: var(--teal-text); }
.b-coral { background: var(--coral-bg); color: var(--coral-text); }
.b-blue { background: var(--blue-bg); color: var(--blue-text); }
.b-amber { background: var(--amber-bg); color: var(--amber-text); }
.b-green { background: var(--green-bg); color: var(--green-text); }
.b-pink { background: var(--pink-bg); color: var(--pink-text); }
.q-text { font-size: 14px; color: var(--text); line-height: 1.7; }
.q-answer { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.q-card.open .q-answer { display: block; }
.shiwake { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.shiwake-side { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
.shiwake-label { font-size: 10px; font-weight: 500; margin-bottom: 4px; letter-spacing: 0.5px; }
.shiwake-label.debit-label { color: var(--debit); }
.shiwake-label.credit-label { color: var(--credit); }
.shiwake-line { font-size: 13px; color: var(--text); line-height: 1.6; display: flex; justify-content: space-between; gap: 6px; padding: 1px 0; }
.shiwake-line .acc { flex: 1; }
.shiwake-line .amt { font-variant-numeric: tabular-nums; color: var(--text2); }
.q-hint { font-size: 12px; color: var(--text2); margin-top: 8px; padding: 8px 10px; background: var(--amber-bg); color: var(--amber-text); border-radius: 8px; line-height: 1.5; }
.bottom-nav { position: sticky; bottom: 0; background: rgba(245,244,240,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 10px 16px calc(10px + var(--safe-bottom)); display: flex; gap: 8px; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); margin-top: 12px; }
@media (prefers-color-scheme: dark) { .bottom-nav { background: rgba(20,18,16,0.9); } }
.nav-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 8px 16px; font-size: 13px; color: var(--text); cursor: pointer; font-family: inherit; font-weight: 500; }
.nav-btn:disabled { opacity: 0.4; }
.page-indicator { font-size: 13px; color: var(--text2); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">📓 簿記論 仕訳100問</span>
    <span class="progress-text" id="prog-text">0 / 100</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="cats" style="margin-top:10px;" id="cat-row"></div>
</div>

<div id="install-hint" class="install-hint">
  <span class="hint-icon">📲</span>
  <span>Safariで開いて「共有」→「ホーム画面に追加」でアプリとして使えます</span>
</div>

<div class="stats-row">
  <div class="stat-pill"><div class="stat-num" id="s-total">100</div><div class="stat-label">全問</div></div>
  <div class="stat-pill"><div class="stat-num" id="s-show">10</div><div class="stat-label">表示中</div></div>
  <div class="stat-pill"><div class="stat-num" id="s-done">0</div><div class="stat-label">回答済</div></div>
</div>

<div class="page-actions">
  <button class="action-btn" onclick="revealPage()">このページを表示</button>
  <button class="action-btn" onclick="hidePage()">隠す</button>
</div>

<div class="q-list" id="q-list"></div>

<div class="bottom-nav">
  <button class="nav-btn" id="prev-btn" onclick="goPage(-1)">← 前へ</button>
  <span class="page-indicator" id="page-ind">1 / 10</span>
  <button class="nav-btn" id="next-btn" onclick="goPage(1)">次へ →</button>
</div>

<script>
const Q = [
  // 有価証券（12問）
  {c:"有価証券",b:"b-blue",t:"その他有価証券（取得原価800,000円、前期末時価850,000円、税効果適用済・実効税率30%）について、当期首の振戻仕訳を示せ。",d:[["繰延税金負債","15,000"],["その他有価証券評価差額金","35,000"]],cr:[["その他有価証券","50,000"]],h:"前期末計上額を逆仕訳"},
  {c:"有価証券",b:"b-blue",t:"その他有価証券（取得原価1,000,000円）の当期末時価が900,000円となった。実効税率30%として全部純資産直入法により処理せよ。",d:[["繰延税金資産","30,000"],["その他有価証券評価差額金","70,000"]],cr:[["その他有価証券","100,000"]],h:"評価損100,000のうち税効果30,000を控除"},
  {c:"有価証券",b:"b-blue",t:"売買目的有価証券（帳簿価額500,000円）を時価620,000円で売却し、代金は後日受領することとした。",d:[["未収入金","620,000"]],cr:[["売買目的有価証券","500,000"],["有価証券売却益","120,000"]],h:"売買目的は時価帳簿"},
  {c:"有価証券",b:"b-blue",t:"満期保有目的債券（額面1,000,000円、取得原価950,000円、満期5年）を当期首に取得した。償却原価法（定額法）により決算整理仕訳を行え。",d:[["満期保有目的債券","10,000"]],cr:[["有価証券利息","10,000"]],h:"50,000÷5年"},
  {c:"有価証券",b:"b-blue",t:"A社株式（その他有価証券）を1,200,000円で取得していたが、追加取得により子会社となった。追加取得直前の時価1,400,000円、評価差額金140,000円（税効果30%適用済）を振り戻し、子会社株式に振り替える仕訳を示せ。",d:[["繰延税金負債","60,000"],["その他有価証券評価差額金","140,000"],["子会社株式","1,400,000"]],cr:[["その他有価証券","1,400,000"],["その他有価証券","200,000"]],h:"評価差額の振戻＋振替"},
  {c:"有価証券",b:"b-blue",t:"その他有価証券評価差額金の処理として部分純資産直入法を採用している。取得原価500,000円の株式の期末時価が420,000円となった。実効税率30%。",d:[["投資有価証券評価損","80,000"]],cr:[["その他有価証券","80,000"]],h:"部分純資産直入：評価損は当期費用、税効果は別仕訳"},
  {c:"有価証券",b:"b-blue",t:"上問の続き。部分純資産直入法における税効果の仕訳を示せ。",d:[["繰延税金資産","24,000"]],cr:[["法人税等調整額","24,000"]],h:"80,000×30%"},
  {c:"有価証券",b:"b-blue",t:"関連会社株式（取得原価600,000円）の期末時価が著しく下落し150,000円となり、回復見込みがない。強制評価減を行え。",d:[["関係会社株式評価損","450,000"]],cr:[["関連会社株式","450,000"]],h:"50%以上下落で回復見込みなし"},
  {c:"有価証券",b:"b-blue",t:"額面1,000,000円の社債を980,000円で買入消却した（帳簿価額990,000円）。代金は当座預金より支払。",d:[["社債","990,000"]],cr:[["当座預金","980,000"],["社債償還益","10,000"]],h:"帳簿価額と買入価額の差額"},
  {c:"有価証券",b:"b-blue",t:"その他有価証券（取得原価300,000円、当期末時価280,000円）について、評価損の30%が損金算入されない。実効税率30%として税効果の仕訳を示せ。",d:[["繰延税金資産","6,000"],["その他有価証券評価差額金","14,000"]],cr:[["その他有価証券","20,000"]],h:"税効果は全額に適用、純資産直入"},
  {c:"有価証券",b:"b-blue",t:"取得原価800,000円のその他有価証券を時価950,000円で売却した。前期末時価が900,000円で評価差額金70,000円（税効果30%適用済）が計上されている。",d:[["現金預金","950,000"],["繰延税金負債","30,000"],["その他有価証券評価差額金","70,000"]],cr:[["その他有価証券","900,000"],["投資有価証券売却益","150,000"]],h:"振戻＋売却を同時に処理"},
  {c:"有価証券",b:"b-blue",t:"額面500,000円の国債を額面@98円で取得し、端数利息1,500円とともに小切手を振出して支払った。売買目的。",d:[["売買目的有価証券","490,000"],["有価証券利息","1,500"]],cr:[["当座預金","491,500"]],h:"端数利息は有価証券利息"},

  // 連結・持分法（13問）
  {c:"連結",b:"b-purple",t:"P社はS社株式の80%を取得時にS社の純資産が資本金500,000円・利益剰余金200,000円のときに700,000円で取得した。投資と資本の相殺消去仕訳を示せ。",d:[["資本金","500,000"],["利益剰余金","200,000"],["のれん","140,000"],["非支配株主持分","140,000"]],cr:[["S社株式","700,000"],["非支配株主持分","140,000"]],h:"のれん＝700,000−700,000×80%"},
  {c:"連結",b:"b-purple",t:"上問ののれん（残存5年・定額法）の連結第1期末償却仕訳を示せ。",d:[["のれん償却額","28,000"]],cr:[["のれん","28,000"]],h:"140,000÷5年"},
  {c:"連結",b:"b-purple",t:"S社（80%子会社）が当期純利益150,000円を計上した。非支配株主持分への振替仕訳を示せ。",d:[["非支配株主に帰属する当期純利益","30,000"]],cr:[["非支配株主持分","30,000"]],h:"150,000×20%"},
  {c:"連結",b:"b-purple",t:"S社（80%子会社）が剰余金の配当50,000円を実施した。連結修正仕訳を示せ。",d:[["受取配当金","40,000"],["非支配株主持分","10,000"]],cr:[["利益剰余金（剰余金の配当）","50,000"]],h:"親会社受取分と非支配持分減少"},
  {c:"連結",b:"b-purple",t:"P社はS社（100%子会社）に商品600,000円（原価450,000円）を販売した。期末にS社の在庫として200,000円残っている。アップストリーム取引でないとして未実現利益消去の仕訳を示せ。",d:[["売上原価","50,000"]],cr:[["商品","50,000"]],h:"200,000×(150,000/600,000)＝50,000"},
  {c:"連結",b:"b-purple",t:"上問の税効果の仕訳を示せ。実効税率30%。",d:[["繰延税金資産","15,000"]],cr:[["法人税等調整額","15,000"]],h:"未実現利益消去×30%"},
  {c:"連結",b:"b-purple",t:"S社（80%）がP社に商品（原価400,000円・売価500,000円）を販売し、P社の期末在庫に150,000円残っている。アップストリーム取引の未実現利益消去仕訳を示せ。",d:[["売上原価","30,000"]],cr:[["商品","30,000"]],h:"150,000×(100,000/500,000)"},
  {c:"連結",b:"b-purple",t:"上問の非支配株主持分への按分仕訳を示せ（税効果は無視）。",d:[["非支配株主持分","6,000"]],cr:[["非支配株主に帰属する当期純利益","6,000"]],h:"30,000×20%（持分減少を戻す）"},
  {c:"連結",b:"b-purple",t:"P社はA社株式の30%を400,000円で取得（持分法適用会社）。A社の純資産が1,200,000円のときに取得した。投資差額の処理として、のれん相当額があれば計算しその発生仕訳は不要だが期末に5年で償却する仕訳を示せ。",d:[["持分法による投資損益","8,000"]],cr:[["A社株式","8,000"]],h:"40,000÷5年（のれん相当40,000）"},
  {c:"連結",b:"b-purple",t:"A社（持分30%、持分法）が当期純利益200,000円を計上した。",d:[["A社株式","60,000"]],cr:[["持分法による投資損益","60,000"]],h:"200,000×30%"},
  {c:"連結",b:"b-purple",t:"A社（持分30%）から配当金30,000円を受け取った。持分法における修正仕訳を示せ（受取時の仕訳は処理済）。",d:[["受取配当金","9,000"]],cr:[["A社株式","9,000"]],h:"30,000×30%"},
  {c:"連結",b:"b-purple",t:"P社はS社株式60%を保有。当期に追加で20%を300,000円で取得した。追加取得時のS社資本剰余金は1,200,000円、利益剰余金300,000円、評価差額20,000円。非支配株主持分の減少と差額処理を示せ。",d:[["非支配株主持分","304,000"]],cr:[["S社株式","300,000"],["資本剰余金","4,000"]],h:"1,520,000×20%＝304,000、差額は資本剰余金"},
  {c:"連結",b:"b-purple",t:"P社はS社株式80%を保有。当期に10%を200,000円で売却（帳簿価額150,000円）。売却時のS社純資産は1,800,000円。個別では売却益50,000円計上済。連結修正仕訳を示せ。",d:[["S社株式売却益","50,000"]],cr:[["非支配株主持分","180,000"],["資本剰余金","△130,000"]],h:"持分減少分を非支配株主持分へ振替"},

  // 棚卸資産・原価計算（10問）

const cats = ["全て","有価証券","連結","棚卸資産","固定資産","引当金","税効果","外貨建","リース","純資産"];
let currentCat = "全て";
let currentPage = 1;
const perPage = 10;
let opened = new Set();

function getFiltered() {
  return currentCat === "全て" ? Q : Q.filter(q => q.c === currentCat);
}

function renderCats() {
  document.getElementById('cat-row').innerHTML = cats.map(c => 
    `<button class="cat-btn ${c===currentCat?'active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) {
  currentCat = c;
  currentPage = 1;
  renderCats();
  render();
}

function fmtSide(arr) {
  return arr.map(x => `<div class="shiwake-line"><span class="acc">${x[0]}</span><span class="amt">${x[1]}</span></div>`).join('');
}

function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / perPage));
  if (currentPage > pages) currentPage = pages;
  const start = (currentPage - 1) * perPage;
  const slice = filtered.slice(start, start + perPage);

  document.getElementById('s-total').textContent = Q.length;
  document.getElementById('s-show').textContent = slice.length;
  document.getElementById('s-done').textContent = opened.size;
  document.getElementById('prog-text').textContent = `${opened.size} / ${Q.length}`;
  document.getElementById('prog-fill').style.width = (opened.size / Q.length * 100) + '%';
  document.getElementById('page-ind').textContent = `${currentPage} / ${pages}`;
  document.getElementById('prev-btn').disabled = currentPage <= 1;
  document.getElementById('next-btn').disabled = currentPage >= pages;

  document.getElementById('q-list').innerHTML = slice.map((q, i) => {
    const idx = Q.indexOf(q);
    const id = 'q' + idx;
    const isOpen = opened.has(id);
    return `
      <div class="q-card ${isOpen?'open':''}" onclick="toggleQ('${id}')">
        <div class="q-meta">
          <span class="q-num">Q${idx+1}</span>
          <span class="badge ${q.b}">${q.c}</span>
        </div>
        <div class="q-text">${q.t}</div>
        <div class="q-answer">
          <div class="shiwake">
            <div class="shiwake-side">
              <div class="shiwake-label debit-label">借方</div>
              ${fmtSide(q.d)}
            </div>
            <div class="shiwake-side">
              <div class="shiwake-label credit-label">貸方</div>
              ${fmtSide(q.cr)}
            </div>
          </div>
          ${q.h?`<div class="q-hint">💡 ${q.h}</div>`:''}
        </div>
      </div>`;
  }).join('');
}

function toggleQ(id) {
  if (opened.has(id)) opened.delete(id);
  else opened.add(id);
  render();
}

function goPage(d) {
  if (typeof d === 'number' && Math.abs(d) === 1) {
    currentPage += d;
  } else {
    currentPage = d;
  }
  window.scrollTo({top: 0, behavior: 'smooth'});
  render();
}

function revealPage() {
  const filtered = getFiltered();
  const start = (currentPage - 1) * perPage;
  const slice = filtered.slice(start, start + perPage);
  slice.forEach(q => opened.add('q' + Q.indexOf(q)));
  render();
}

function hidePage() {
  const filtered = getFiltered();
  const start = (currentPage - 1) * perPage;
  const slice = filtered.slice(start, start + perPage);
  slice.forEach(q => opened.delete('q' + Q.indexOf(q)));
  render();
}

renderCats();
render();
</script>
